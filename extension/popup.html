<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flagtap</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <span class="logo">🚩</span>
        <span class="title">Flagtap</span>
      </div>
      <div class="header-right">
        <span id="provider-badge" class="badge hidden"></span>
      </div>
    </header>

    <div id="state-empty" class="state-message">
      <p>
        No feature flags detected on this page
        <button id="retry-btn" class="retry-btn" title="Refresh flags">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </p>
      <p class="hint">Flags appear once the SDK initializes and streams.</p>
    </div>

    <div id="state-flags" class="hidden">
      <div class="toolbar">
        <span id="override-count" class="override-count hidden"></span>
        <button id="clear-all-btn" class="clear-all hidden">Clear all overrides</button>
      </div>
      <ul id="flag-list"></ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
